<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Social links profile</title>

</head>
<body>
<div class="template">
  <div class="photo"><img src="avatar-jessica.jpeg" alt="Jessica" style="height: 60px;width: 60px;border-radius: 50%;"></div>
  <div class="name"><p><b>Jessica Randall</b></p></div>
  <div class="work"><p><b>London, United Kingdom</b></p></div>
  <div class="prop"><p><b>"Front-end developer and avid reader."</b></p></div>
  <div class="buttons">
    <div class="option" id="btn1"><title>GitHub</title><b>GitHub</b></div>
    <div class="option" id="btn2"><title>Frontend Mentor</title><b>Frontend Mentor</b></div>
    <div class="option" id="btn3"><title>LinkedIn</title><b>LinkedIn</b></div>
    <div class="option" id="btn4"><title>Twitter</title><b>Twitter</b></div>
    <div class="option" id="btn5"><title>Instagram</title><b>Instagram</b></div>
  </div>
</div>

  
  
  
  
  
  <div class="attribution">
    <!-- Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>. -->
  </div>
</body>
</html>
